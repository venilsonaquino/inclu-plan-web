<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ea3eb9",
                        "secondary": "#A24AF1",
                        "background-light": "#f8f6f7",
                        "background-dark": "#21111d",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .organic-gradient {
            background: radial-gradient(circle at 20% 30%, rgba(234, 62, 185, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(162, 74, 241, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(234, 62, 185, 0.05) 0%, transparent 70%);
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 organic-gradient pointer-events-none"></div>
<div class="relative z-10 w-full max-w-md px-6">
<div class="glass-card rounded-xl p-8 shadow-2xl flex flex-col items-center">
<div class="mb-10 flex flex-col items-center gap-3">
<div class="size-12 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z" fill="currentColor"></path>
</svg>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100">incluPlan</h1>
<p class="text-sm text-slate-600 dark:text-slate-400 font-medium">Bem-vindo de volta</p>
</div>
<form class="w-full space-y-6">
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-200 ml-1">E-mail</label>
<div class="relative">
<input class="w-full h-14 bg-white/60 dark:bg-slate-800/60 border border-white/40 dark:border-slate-700/40 rounded-xl px-5 py-3 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all shadow-sm" placeholder="Digite seu e-mail" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-200">Senha</label>
<a class="text-xs font-medium text-primary hover:underline" href="#">Esqueceu a senha?</a>
</div>
<div class="relative flex items-center">
<input class="w-full h-14 bg-white/60 dark:bg-slate-800/60 border border-white/40 dark:border-slate-700/40 rounded-xl px-5 py-3 pr-12 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all shadow-sm" placeholder="Digite sua senha" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-slate-600 transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="pt-4">
<button class="w-full h-14 rounded-full bg-gradient-to-r from-primary to-secondary text-white font-bold text-lg shadow-lg hover:shadow-primary/30 transition-shadow active:scale-[0.98]" type="submit">
                        Entrar
                    </button>
</div>
</form>
<div class="mt-8 text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                    Ainda não tem uma conta? 
                    <a class="font-bold text-primary hover:underline" href="#">Cadastre-se</a>
</p>
</div>
</div>
<div class="mt-8 flex justify-center gap-6 text-slate-400 dark:text-slate-500 text-xs font-medium">
<a class="hover:text-primary transition-colors" href="#">Termos de Uso</a>
<a class="hover:text-primary transition-colors" href="#">Privacidade</a>
<a class="hover:text-primary transition-colors" href="#">Ajuda</a>
</div>
</div>
</body></html>
